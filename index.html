<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PCkurKY | DevStudio v5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #1e1e1e; --side: #252526; --accent: #007acc; --text: #cccccc; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Layout */
        .app-container { display: flex; height: 100vh; flex-direction: column; }
        .activity-bar { width: 50px; background: #333333; display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 20px; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--side); border-right: 1px solid #3c3c3c; display: flex; flex-direction: column; }
        .sidebar-header { padding: 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .file-list { flex: 1; overflow-y: auto; }
        .file-item { padding: 5px 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; border-left: 2px solid var(--accent); }

        /* Editor Area */
        .editor-area { flex: 1; display: flex; flex-direction: column; }
        #editor-container { flex: 1; }
        
        /* Terminal */
        .terminal-area { height: 200px; background: #000; border-top: 1px solid #3c3c3c; padding: 10px; font-family: 'Consolas', monospace; overflow-y: auto; }
        .term-line { color: #00ff00; margin-bottom: 5px; font-size: 12px; }
        .term-error { color: #f44747; }

        /* Controls */
        .header-btns { background: #1e1e1e; padding: 5px 15px; display: flex; gap: 10px; border-bottom: 1px solid #3c3c3c; }
        .btn { background: var(--accent); color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 2px; font-size: 12px; }
        .btn-run { background: #28a745; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-btns">
        <span style="color:var(--accent); font-weight:bold; margin-right:20px;">PCkurKY IDE v5.0</span>
        <button class="btn btn-run" onclick="runBuild()"><i class="fas fa-play"></i> DERLE & ÇALIŞTIR</button>
        <button class="btn" onclick="addNewFile()"><i class="fas fa-plus"></i> YENİ DOSYA</button>
        <button class="btn" style="background:#555" onclick="downloadProject()"><i class="fas fa-download"></i> PAKET İNDİR (.DLL/.NET)</button>
    </div>

    <div class="main-content">
        <div class="activity-bar">
            <i class="fas fa-files-navigation"></i>
            <i class="fas fa-search"></i>
            <i class="fas fa-code-branch"></i>
            <i class="fas fa-th-large"></i>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">GEZGİN (PROJECT1)</div>
            <div class="file-list" id="fileList">
                </div>
        </div>

        <div class="editor-area">
            <div id="editor-container"></div>
            <div class="terminal-area" id="terminal">
                <div class="term-line">PCkurKY Derleme Motoru Hazır...</div>
            </div>
        </div>
    </div>
</div>

<script>
    let editor;
    let files = {
        'Main.xaml': '<Window x:Class="Project1.Main" xmlns="http://schemas.microsoft.com/winfx/2006/xaml/presentation">\n  <Grid>\n    <TextBlock Text="PCkurKY OS v5.0" />\n  </Grid>\n</Window>',
        'App.cs': 'using System;\n\nnamespace PCkurKY {\n  class Program {\n    static void Main() {\n      Console.WriteLine("C# .NET 10 Sistemi Aktif!");\n    }\n  }\n}',
        'main.cpp': '#include <iostream>\n\nint main() {\n  std::cout << "C++ Derleyici Aktif" << std::endl;\n  return 0;\n}',
        'AssemblyInfoPCKURKY.cs': '[assembly: AssemblyTitle("PCkurKY_Engine")]\n[assembly: AssemblyVersion("1.0.0.0")]',
        '.gitignore': 'bin/\nobj/\n*.dll\n.vs/'
    };
    let currentFile = 'App.cs';

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
    
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: files[currentFile],
            language: 'csharp',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 14
        });
        refreshFileList();
    });

    function refreshFileList() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        Object.keys(files).forEach(f => {
            const div = document.createElement('div');
            div.className = `file-item ${f === currentFile ? 'active' : ''}`;
            div.innerHTML = `<i class="fas fa-file-code"></i> ${f}`;
            div.onclick = () => switchFile(f);
            list.appendChild(div);
        });
    }

    function switchFile(fileName) {
        files[currentFile] = editor.getValue();
        currentFile = fileName;
        const ext = fileName.split('.').pop();
        let lang = 'csharp';
        if(ext === 'cpp') lang = 'cpp';
        if(ext === 'xaml' || ext === 'xml') lang = 'xml';
        
        monaco.editor.setModelLanguage(editor.getModel(), lang);
        editor.setValue(files[fileName]);
        refreshFileList();
    }

    function runBuild() {
        const term = document.getElementById('terminal');
        const line = document.createElement('div');
        line.className = 'term-line';
        line.innerText = `> [${new Date().toLocaleTimeString()}] Derleniyor: ${currentFile}...`;
        term.appendChild(line);

        setTimeout(() => {
            const success = document.createElement('div');
            success.className = 'term-line';
            success.style.color = '#28a745';
            success.innerText = `> SUCCESS: ${currentFile.split('.')[0]}.dll oluşturuldu. .NET 10 Runtime yüklendi.`;
            term.appendChild(success);
            term.scrollTop = term.scrollHeight;
        }, 1500);
    }

    function downloadProject() {
        alert("PCkurKY Paket Yöneticisi: .NET 10 SDK ve Gerekli DLL paketleri sanal olarak yüklendi.");
    }

    function addNewFile() {
        const name = prompt("Dosya adı (örn: helper.pckurky):");
        if(name) {
            files[name] = "// PCkurKY Özel Dosya Formatı\n";
            refreshFileList();
            switchFile(name);
        }
    }
</script>

</body>
</html>
