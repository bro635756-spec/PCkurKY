<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCkurKY | IDE & Test Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #0d1117; --accent: #00f2ff; --panel: #161b22; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Consolas', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Top Bar */
        .top-bar { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; }
        .logo { color: var(--accent); font-weight: bold; }
        .run-btn { background: #27c93f; color: black; border: none; padding: 5px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Workspace */
        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        /* Editor Side */
        .editor-side { flex: 1; position: relative; border-right: 1px solid #30363d; }
        textarea, #highlight-layer {
            position: absolute; width: 100%; height: 100%; padding: 20px;
            box-sizing: border-box; font-size: 15px; line-height: 1.5;
            border: none; outline: none; white-space: pre; overflow: auto;
        }
        textarea { background: transparent; color: transparent; caret-color: white; z-index: 2; resize: none; }
        #highlight-layer { background: var(--bg); color: #c9d1d9; z-index: 1; pointer-events: none; }

        /* Preview Side */
        .preview-side { flex: 1; background: white; display: flex; flex-direction: column; }
        .preview-header { background: #eee; color: #333; padding: 5px 10px; font-size: 12px; font-weight: bold; }
        iframe { flex: 1; border: none; background: white; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">PCkurKY IDE v3.5 <span id="lang-tag" style="font-size: 10px; color: #8b949e;">[HTML MODE]</span></div>
        <div class="controls">
            <button class="run-btn" onclick="runTest()">KODU TEST ET (RUN)</button>
        </div>
    </div>

    <div class="workspace">
        <div class="editor-side">
            <textarea id="editor" spellcheck="false" oninput="updateView()"></textarea>
            <pre id="highlight-layer"><code id="code-box" class="language-html"></code></pre>
        </div>

        <div class="preview-side">
            <div class="preview-header">CANLI TEST PANELİ (PREVIEW)</div>
            <iframe id="preview"></iframe>
        </div>
    </div>

<script>
    const editor = document.getElementById('editor');
    const codeBox = document.getElementById('code-box');
    const preview = document.getElementById('preview');

    // LocalStorage'dan son kodu getir
    window.onload = () => {
        const lastCode = localStorage.getItem('pckurky_test_code') || "<h1>Merhaba Burak!</h1>\n<p>Buraya kod yaz ve Run'a bas.</p>";
        editor.value = lastCode;
        updateView();
    };

    function updateView() {
        const code = editor.value;
        codeBox.textContent = code;
        hljs.highlightElement(codeBox);
        
        // Kaydırma senkronu
        document.getElementById('highlight-layer').scrollTop = editor.scrollTop;
        
        // LocalStorage kaydet
        localStorage.setItem('pckurky_test_code', code);
    }

    function runTest() {
        const code = editor.value;
        const previewDoc = preview.contentDocument || preview.contentWindow.document;
        previewDoc.open();
        previewDoc.write(code);
        previewDoc.close();
    }

    // Scroll senkronu
    editor.onscroll = () => {
        document.getElementById('highlight-layer').scrollTop = editor.scrollTop;
        document.getElementById('highlight-layer').scrollLeft = editor.scrollLeft;
    };

    // Tab tuşu desteği
    editor.onkeydown = function(e) {
        if(e.keyCode === 9) {
            e.preventDefault();
            var start = this.selectionStart;
            var end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            updateView();
        }
    };
</script>

</body>
</html>
