<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCkurKY | Teknik Destek Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --purple: #7000ff;
            --bg-dark: #0d1117;
            --card-bg: #161b22;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: #c9d1d9;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .terminal-window {
            width: 90%;
            max-width: 700px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .terminal-header {
            background: #21262d;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .brand { font-family: 'JetBrains Mono'; font-size: 0.9rem; color: var(--neon); font-weight: bold; }

        .content { padding: 25px; }

        h2 { font-family: 'JetBrains Mono'; color: white; margin-top: 0; }

        .chat-area {
            height: 300px;
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #30363d;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .msg { margin-bottom: 15px; }
        .user-msg { color: var(--neon); font-weight: bold; }
        .ai-msg { color: #8b949e; border-left: 2px solid var(--purple); padding-left: 10px; }

        .input-group { display: flex; gap: 10px; }

        input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 5px var(--neon); }

        button {
            background: var(--neon);
            color: black;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #00d1dc; transform: scale(1.05); }

        .status { font-size: 0.7rem; color: #484f58; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="brand">PCkurKY_OS_v2.0</div>
    </div>

    <div class="content">
        <h2>🚀 Teknik Destek AI</h2>
        <div class="chat-area" id="chatArea">
            <div class="msg ai-msg">Sistem hazır Burak. Bilgisayarınla ilgili bir sorun varsa hemen yazabilirsin.</div>
        </div>

        <div class="input-group">
            <input type="text" id="userInput" placeholder="Komutunuzu yazın..." autocomplete="off">
            <button onclick="askAI()">GÖNDER</button>
        </div>
        <div class="status">Bağlantı Durumu: <span style="color: #27c93f;">AKTİF</span> | Powered by GPT-4o-mini</div>
    </div>
</div>

<script>
    // OpenAI API Anahtarın
    const API_KEY = "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";

    async function askAI() {
        const inputField = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const userText = inputField.value.trim();

        if (!userText) return;

        // Kullanıcı mesajını ekrana yaz
        chatArea.innerHTML += `<div class="msg user-msg">> ${userText}</div>`;
        inputField.value = "";
        chatArea.scrollTop = chatArea.scrollHeight;

        const loadingMsg = document.createElement('div');
        loadingMsg.className = 'msg ai-msg';
        loadingMsg.innerText = "Yapay zeka analiz ediyor...";
        chatArea.appendChild(loadingMsg);

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "gpt-4o-mini",
                    "messages": [
                        {"role": "system", "content": "Sen PCkurKY markasının uzman teknik destek asistanısın. Burak tarafından geliştirildin. Kısa, teknik ve samimi cevaplar ver."},
                        {"role": "user", "content": userText}
                    ]
                })
            });

            const data = await response.json();
            
            chatArea.removeChild(loadingMsg);

            if (data.choices && data.choices[0]) {
                const aiText = data.choices[0].message.content;
                chatArea.innerHTML += `<div class="msg ai-msg">${aiText}</div>`;
            } else {
                chatArea.innerHTML += `<div class="msg ai-msg" style="color: #ff5f56;">Hata: API yanıt veremedi. Bakiye bitmiş veya anahtar geçersiz olabilir.</div>`;
            }

        } catch (error) {
            chatArea.removeChild(loadingMsg);
            chatArea.innerHTML += `<div class="msg ai-msg" style="color: #ff5f56;">Bağlantı Hatası: CORS engeli veya internet sorunu.</div>`;
        }

        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Enter tuşuna basınca gönderme
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') askAI();
    });
</script>

</body>
</html>
