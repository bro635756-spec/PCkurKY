<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PCkurKY | C++ WASM Compiler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #0d1117; --accent: #00f2ff; --term: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Consolas', monospace; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #161b22; padding: 10px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .editor-container { flex: 1; position: relative; border-right: 2px solid #30363d; }
        textarea, #hl-layer {
            position: absolute; width: 100%; height: 100%; padding: 15px;
            font-size: 14px; line-height: 1.5; border: none; outline: none;
            white-space: pre; overflow: auto; box-sizing: border-box;
        }
        textarea { background: transparent; color: transparent; caret-color: white; z-index: 2; resize: none; }
        #hl-layer { background: var(--bg); z-index: 1; pointer-events: none; }
        .terminal { flex: 0.4; background: var(--term); color: #00ff00; padding: 15px; overflow-y: auto; font-size: 13px; }
        .btn { background: var(--accent); color: black; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #555; }
    </style>
</head>
<body>

<div class="header">
    <span>PCkurKY C++ IDE v4.0 (WebAssembly)</span>
    <button class="btn" id="runBtn" onclick="compileAndRun()">KODU DERLE VE ÇALIŞTIR</button>
</div>

<div class="main">
    <div class="editor-container">
        <textarea id="editor" spellcheck="false" oninput="update()">#include <iostream>

int main() {
    std::cout << "PCkurKY C++ Derleyici Calisiyor!\n";
    std::cout << "Burak icin sistem v4.0 aktif.\n";
    
    int sayi = 10;
    std::cout << "Sayi degeri: " << sayi * 5 << std::endl;
    
    return 0;
}</textarea>
        <pre id="hl-layer"><code id="code" class="language-cpp"></code></pre>
    </div>
    <div class="terminal" id="output">Derleyici motoru hazirlaniyor... Lutfen bekleyin.</div>
</div>

<script type="module">
    // Bu kısım bir API üzerinden derleme yapar, çünkü tarayıcıda C++ derlemek ağır bir iştir.
    // En hızlı ve CORS hatası vermeyen "Wandbox" veya benzeri bir motor simülasyonu kullanıyoruz.
    
    window.update = () => {
        const editor = document.getElementById('editor');
        const code = document.getElementById('code');
        code.textContent = editor.value;
        hljs.highlightElement(code);
        localStorage.setItem('pckurky_cpp', editor.value);
    };

    window.compileAndRun = async () => {
        const out = document.getElementById('output');
        const btn = document.getElementById('runBtn');
        const code = document.getElementById('editor').value;

        out.innerText = "> Derleniyor...\n";
        btn.disabled = true;

        try {
            // Gerçek zamanlı C++ derleme API'si
            const response = await fetch("https://wandbox.org/api/compile.json", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    code: code,
                    compiler: "gcc-head",
                    save: false
                })
            });

            const result = await response.json();
            
            out.innerText = "";
            if (result.program_output) out.innerText += result.program_output;
            if (result.program_error) out.innerText += "\n[HATA]\n" + result.program_error;
            if (result.compiler_error) out.innerText += "\n[DERLEME HATASI]\n" + result.compiler_error;

        } catch (err) {
            out.innerText = "Bağlantı Hatası: Derleyici sunucusuna ulaşılamadı.";
        }
        btn.disabled = false;
    };

    window.onload = () => {
        const saved = localStorage.getItem('pckurky_cpp');
        if(saved) document.getElementById('editor').value = saved;
        update();
        document.getElementById('output').innerText = "Sistem Hazır. Kodunu yaz ve Derle'ye bas.";
    };
</script>

</body>
</html>
