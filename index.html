<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCkurKY | Dev-Editor v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --accent: #00f2ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Consolas', monospace; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 220px; background: var(--sidebar); border-right: 1px solid #30363d; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        .lang-btn { background: transparent; border: 1px solid #30363d; color: #8b949e; padding: 8px; border-radius: 4px; cursor: pointer; text-align: left; transition: 0.2s; }
        .lang-btn:hover, .lang-btn.active { background: #21262d; color: var(--accent); border-color: var(--accent); }

        /* Main Editor Area */
        .editor-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .toolbar { background: #21262d; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        
        textarea, #highlight-layer {
            position: absolute; top: 55px; left: 0; width: 100%; height: calc(100% - 55px);
            padding: 20px; box-sizing: border-box; font-family: 'Consolas', monospace;
            font-size: 16px; line-height: 1.5; border: none; outline: none; white-space: pre; overflow: auto;
        }

        textarea { background: transparent; color: transparent; caret-color: white; z-index: 2; resize: none; }
        #highlight-layer { background: var(--bg); color: #c9d1d9; z-index: 1; pointer-events: none; }

        .save-status { font-size: 0.7rem; color: #27c93f; }
        button.run-btn { background: var(--accent); color: black; border: none; padding: 5px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>PCkurKY IDE</h3>
        <button class="lang-btn active" onclick="setLang('html')">index.html</button>
        <button class="lang-btn" onclick="setLang('cpp')">main.cpp</button>
        <button class="lang-btn" onclick="setLang('csharp')">Program.cs</button>
        <button class="lang-btn" onclick="setLang('java')">App.java</button>
        <button class="lang-btn" onclick="setLang('css')">style.css</button>
        <button class="lang-btn" onclick="setLang('json')">config.json</button>
        <button class="lang-btn" onclick="setLang('xml')">data.xml</button>
    </div>

    <div class="editor-container">
        <div class="toolbar">
            <span id="file-name">index.html</span>
            <div>
                <span class="save-status" id="status">Otomatik Kaydedildi</span>
                <button class="run-btn" onclick="askAIHelp()">AI DESTEK</button>
            </div>
        </div>
        
        <textarea id="editor" spellcheck="false" oninput="updateEditor()"></textarea>
        <pre id="highlight-layer"><code id="code-box" class="language-html"></code></pre>
    </div>

<script>
    const editor = document.getElementById('editor');
    const codeBox = document.getElementById('code-box');
    const fileNameDisplay = document.getElementById('file-name');
    const status = document.getElementById('status');
    let currentLang = 'html';

    // LocalStorage: Veriyi Yükle
    window.onload = () => {
        const savedCode = localStorage.getItem('pckurky_code_' + currentLang);
        if (savedCode) {
            editor.value = savedCode;
            updateEditor();
        }
    };

    function setLang(lang) {
        // Eski kodu kaydet
        localStorage.setItem('pckurky_code_' + currentLang, editor.value);
        
        // Yeni dili ayarla
        currentLang = lang;
        fileNameDisplay.innerText = `file.${lang}`;
        codeBox.className = `language-${lang}`;
        
        // Yeni dilin kodunu getir
        const newCode = localStorage.getItem('pckurky_code_' + currentLang) || '';
        editor.value = newCode;
        
        updateEditor();
        
        // Aktif buton rengi
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function updateEditor() {
        const code = editor.value;
        codeBox.textContent = code;
        hljs.highlightElement(codeBox);
        
        // LocalStorage: Veriyi Kaydet
        localStorage.setItem('pckurky_code_' + currentLang, code);
        
        status.innerText = "Kaydediliyor...";
        setTimeout(() => { status.innerText = "Otomatik Kaydedildi"; }, 1000);
    }

    // Tab tuşunu aktif etme
    editor.onkeydown = function(e) {
        if(e.keyCode === 9) {
            e.preventDefault();
            var start = this.selectionStart;
            var end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            updateEditor();
        }
    };

    // Scroll senkronizasyonu
    editor.onscroll = function() {
        document.getElementById('highlight-layer').scrollTop = editor.scrollTop;
        document.getElementById('highlight-layer').scrollLeft = editor.scrollLeft;
    };

    async function askAIHelp() {
        alert("PCkurKY AI modülü aktif! Kodun LocalStorage'da güvende Burak.");
    }
</script>

</body>
</html>
