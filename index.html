<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCkurKY | GPT Destekli Teknik Servis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #7000ff; --bg: #0a0b10; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; padding: 40px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid rgba(0,242,255,0.2); }
        h1 { font-family: 'JetBrains Mono'; font-size: 2.5rem; background: linear-gradient(90deg, var(--neon), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .ai-box { background: #161b22; padding: 20px; border-radius: 15px; margin-top: 30px; border: 1px dashed var(--neon); }
        .input-group { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #21262d; color: white; }
        button { padding: 12px 25px; border-radius: 8px; border: none; background: var(--neon); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px var(--neon); transform: scale(1.05); }
        #response { margin-top: 20px; font-size: 0.9rem; color: #ccc; line-height: 1.6; white-space: pre-wrap; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PCkurKY GPT</h1>
        <p>Burak tarafından geliştirilen OpenAI destekli teknik asistan</p>
    </header>

    <div class="ai-box">
        <h3>🤖 GPT-4o Teknik Destek</h3>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Sorununu buraya yaz...">
            <button id="askBtn">GÖNDER</button>
        </div>
        <div id="response">Yanıt bekleniyor...</div>
    </div>
</div>

<script>
    const API_KEY = "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";

    async function askGPT() {
        const prompt = document.getElementById('userInput').value;
        const responseDiv = document.getElementById('response');
        
        if (!prompt) return;
        responseDiv.innerHTML = "<i>GPT-4o analiz ediyor...</i>";

        try {
            const res = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "gpt-4o-mini", // Daha hızlı ve ucuz model
                    "messages": [
                        {"role": "system", "content": "Sen PCkurKY markasının uzman teknik destek asistanısın. Burak tarafından kodlandın. Kısa, teknik ve yardımcı cevaplar ver."},
                        {"role": "user", "content": prompt}
                    ]
                })
            });

            const data = await res.json();
            
            if (data.choices && data.choices[0]) {
                responseDiv.innerText = data.choices[0].message.content;
            } else if (data.error) {
                responseDiv.innerText = "Hata: " + data.error.message;
            }
        } catch (error) {
            responseDiv.innerText = "Bağlantı hatası! API anahtarı veya bakiye bitmiş olabilir.";
        }
    }

    document.getElementById('askBtn').addEventListener('click', askGPT);
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askGPT();
    });
</script>

</body>
</html>
